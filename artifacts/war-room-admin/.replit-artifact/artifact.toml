kind = "web"
previewPath = "/admin/"
title = "War Room Admin"
version = "1.0.0"
id = "artifacts/war-room-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin/" ]
localPort = 22147

[services.development]
run = "pnpm --filter @workspace/war-room-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/war-room-admin", "run", "build" ]
publicDir = "artifacts/war-room-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22147"
BASE_PATH = "/admin/"
